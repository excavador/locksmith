version: 2

builds:
  - main: ./cmd/gpgsmith
    binary: gpgsmith
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.Date}}
      - -X main.GoVersion={{.Env.GOVERSION}}

archives:
  - format: tar.gz

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
