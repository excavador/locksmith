syntax = "proto3";

package gpgsmith.v1;

import "gpgsmith/v1/common.proto";

// AuditService surfaces the append-only operation log stored inside the
// vault (gpgsmith-audit.yaml).
service AuditService {
  rpc Show(ShowRequest) returns (ShowResponse);
}

// Session is identified by the Gpgsmith-Session header. Field 1 is reserved.
message ShowRequest {
  reserved 1;
  reserved "vault_name";
  int32 last = 2; // optional limit; 0 = all
}

message ShowResponse {
  repeated AuditEntry entries = 1;
}
