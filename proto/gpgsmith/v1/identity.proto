syntax = "proto3";

package gpgsmith.v1;

import "gpgsmith/v1/common.proto";

// IdentityService manages the user IDs (name+email pairs) attached to the
// master key. Maps directly to gpg's --quick-add-uid / --quick-revoke-uid /
// --quick-set-primary-uid commands. Every operation auto-republishes to
// enabled servers when configured.
service IdentityService {
  // List returns all identities on the master key, including revoked ones.
  rpc List(ListIdentitiesRequest) returns (ListIdentitiesResponse);

  // Add attaches a new identity. The uid argument must be in the form
  // "Name <email@example.com>".
  rpc Add(AddIdentityRequest) returns (AddIdentityResponse);

  // Revoke revokes an identity by exact match.
  rpc Revoke(RevokeIdentityRequest) returns (RevokeIdentityResponse);

  // Primary promotes an identity to be the primary user ID.
  rpc Primary(PrimaryIdentityRequest) returns (PrimaryIdentityResponse);
}

message ListIdentitiesRequest {
  string vault_name = 1;
}

message ListIdentitiesResponse {
  repeated Identity identities = 1;
}

message AddIdentityRequest {
  string vault_name = 1;
  string uid = 2;
}

message AddIdentityResponse {}

message RevokeIdentityRequest {
  string vault_name = 1;
  string uid = 2;
}

message RevokeIdentityResponse {}

message PrimaryIdentityRequest {
  string vault_name = 1;
  string uid = 2;
}

message PrimaryIdentityResponse {}
