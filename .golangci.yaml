version: "2"

run:
  timeout: 5m
  tests: true

linters:
  settings:
    grouper:
      const-require-single-const: true
      const-require-grouping: true
      import-require-single-import: true
      import-require-grouping: true
      type-require-single-type: true
      type-require-grouping: true
      var-require-single-var: true
      var-require-grouping: true

    dupl:
      threshold: 200

    sloglint:
      args-on-sep-lines: true
      attr-only: true
      context: "all"
      forbidden-keys:
        - time
        - level
        - msg
        - source
      key-naming-case: "snake"
      no-global: "all"
      no-mixed-args: true
      static-msg: true

    errorlint:
      errorf: true
      comparison: true

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - hugeParam
        - paramTypeCombine

    funlen:
      lines: 200
      statements: 120

    gocyclo:
      min-complexity: 20


    lll:
      line-length: 160

    misspell:
      locale: US

    nolintlint:
      allow-unused: false
      require-explanation: false
      require-specific: false

  enable:
    - bodyclose
    - copyloopvar
    - dogsled
    - dupl
    - errcheck
    - errorlint
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - grouper
    - ineffassign
    - lll
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - revive
    - sloglint
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace

  disable:
    - asciicheck
    - exhaustive
    - exhaustruct
    - forbidigo
    - gochecknoglobals
    - godot
    - godox
    - interfacebloat
    - ireturn
    - mnd
    - nlreturn
    - nonamedreturns
    - testpackage
    - varnamelen
    - wrapcheck

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam
          - funlen
          - goconst
          - dupl
          - gocyclo
          - lll
          - errcheck
          - gocritic
          - bodyclose

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: false
  new: false
  fix: false

formatters:
  enable:
    - gofmt
